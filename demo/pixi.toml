[project]
name = "uniqa-coach"
version = "1.0.0"
description = "UNIQA Conversion Coach – AI assistant for health insurance"
authors = ["Your Name <you@example.com>"]
license = "MIT"
channels = ["conda-forge"]
platforms = ["linux-64"]

# Core deps — enough to run the app, the real leonardo_sim engine bridge, and
# the full evaluation showcase (no GPU / no torch required).
[dependencies]
python = ">=3.10,<3.13"
fastapi = ">=0.115"
uvicorn = ">=0.30"
pydantic = ">=2.0"
numpy = ">=1.26"
scikit-learn = ">=1.3"   # loads the trained coach_model.pkl (HistGradientBoosting)
joblib = ">=1.3"

# The Phi-3 chat panel is optional. Install this feature only if you want the
# conversational coach (heavy download): `pixi run -e slm start`.
[feature.slm.dependencies]
transformers = ">=4.46"
torch = ">=2.4"

[environments]
slm = ["slm"]

[tasks]
start = "python app.py"
dev = "uvicorn app:app --reload --host 127.0.0.1 --port 9696"
